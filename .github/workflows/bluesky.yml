name: Bluesky Auto Post

on:
  schedule:
    - cron: '0 0 * * 1'   # 月曜 09:00 JST
    - cron: '0 3 * * 3'   # 水曜 12:00 JST
    - cron: '0 0 * * 4'   # 木曜 09:00 JST
    - cron: '0 1 * * 6'   # 土曜 10:00 JST
  workflow_dispatch:
    inputs:
      text:
        description: '投稿テキスト（省略時は content/ からランダム選択）'
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private core repo
        uses: actions/checkout@v4
        with:
          repository: aa-0921/sns-auto-poster-core
          token: ${{ secrets.PAT_CLASSIC }}
          path: core

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r core/requirements.txt

      - name: Debug secrets (長さのみ確認・値は非表示)
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          echo "IDENTIFIER 長さ: ${#BLUESKY_IDENTIFIER}"
          echo "APP_PASSWORD 長さ: ${#BLUESKY_APP_PASSWORD}"

      - name: Post to Bluesky
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          POST_TEXT: ${{ github.event.inputs.text }}
        run: |
          if [ -n "$POST_TEXT" ]; then
            python core/scripts/bluesky/post.py --text "$POST_TEXT"
          else
            python core/scripts/bluesky/post.py
          fi
